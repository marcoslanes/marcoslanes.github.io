<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcos Lanes | Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.4);
      --bg-gradient: radial-gradient(circle at top, #1e1b4b, #000000);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
    }

    .light-mode {
      --bg-gradient: radial-gradient(circle at top, #e0e7ff, #f8fafc);
      --text: #0f172a;
      --text-muted: #475569;
      --card-bg: rgba(255, 255, 255, 0.6);
      --card-border: rgba(0, 0, 0, 0.05);
    }

    body {
      margin: 0;
      padding: 3rem 1rem;
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      transition: background 0.5s ease, color 0.5s ease;
    }

    .toggle-theme {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: transform 0.3s ease;
    }

    .toggle-theme:hover {
      transform: rotate(15deg) scale(1.1);
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      margin-bottom: 1rem;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1rem;
      border: 2px solid var(--card-border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;  
      font-size: 3rem;
      margin: 0;
      letter-spacing: 1px;
      line-height: 1;
    }

    .bio {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin: 0.5rem 0 0;
      font-weight: 500;
    }

    .link-group {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .item-card {
      display: flex;
      align-items: center;
      padding: 1rem;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      text-decoration: none;
      color: var(--text);
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .item-card i {
      font-size: 1.3rem;
      width: 44px;
      height: 44px;
      margin-right: 15px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      transition: all 0.3s ease;
    }

    .item-card:hover {
      transform: translateY(-3px);
      background: rgba(255, 255, 255, 0.08);
    }

    /* Cores de Hover Específicas com Glow */
    .youtube:hover { border-color: #ff0000; box-shadow: 0 4px 20px rgba(255, 0, 0, 0.2); }
    .youtube:hover i { color: #ff0000; background: rgba(255, 0, 0, 0.1); }
    
    .kick:hover { border-color: #53fc18; box-shadow: 0 4px 20px rgba(83, 252, 24, 0.2); }
    .kick:hover i { color: #53fc18; background: rgba(83, 252, 24, 0.1); }
    
    .twitch:hover { border-color: #9146FF; box-shadow: 0 4px 20px rgba(145, 70, 255, 0.2); }
    .twitch:hover i { color: #9146FF; background: rgba(145, 70, 255, 0.1); }
    
    .instagram:hover { border-color: #e1306c; box-shadow: 0 4px 20px rgba(225, 48, 108, 0.2); }
    .instagram:hover i { color: #e1306c; background: rgba(225, 48, 108, 0.1); }

    .mercadolivre:hover { border-color: #ffe600; box-shadow: 0 4px 20px rgba(255, 230, 0, 0.2); }
    .mercadolivre:hover i { color: #ffe600; background: rgba(255, 230, 0, 0.1); }

    /* Card de Oferta Modernizado */
    .offer-card {
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.1) 0%, rgba(255, 255, 255, 0.02) 100%);
      border: 1px solid var(--primary);
      flex-direction: column;
      padding: 1.5rem;
      text-align: center;
      box-shadow: 0 0 15px var(--primary-glow);
    }

    .offer-card i {
      background: transparent;
      font-size: 2.5rem;
      color: #38bdf8;
      width: auto;
      height: auto;
      margin: 0 0 10px 0;
    }

    .offer-card .offer-title {
      font-weight: 800;
      font-size: 1.1rem;
      letter-spacing: 0.5px;
    }

    .offer-card:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 8px 25px var(--primary-glow);
      background: linear-gradient(135deg, rgba(99, 102, 241, 0.2) 0%, rgba(255, 255, 255, 0.05) 100%);
    }

    .divider {
      display: flex;
      align-items: center;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 1rem 0 0.5rem;
    }
    
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--card-border);
      margin: 0 10px;
    }
  </style>
</head>
<body>

  <button class="toggle-theme" onclick="toggleTheme()" aria-label="Alternar Tema">
    <i class="fas fa-moon" id="theme-icon"></i>
  </button>

  <div class="container">
    <header>
      <img src="new_logo_lanes_01.png" alt="Marcos Lanes" class="profile-img" />
      <h1>Marcos Lanes</h1>
      <p class="bio">Analista de TI & Streamer</p>
    </header>

    <div class="link-group">
      <a href="https://www.youtube.com/@marcoslanes?sub_confirmation=1" class="item-card youtube" target="_blank">
        <i class="fab fa-youtube"></i> YouTube
      </a>
      <a href="https://www.kick.com/marcoslanes" class="item-card kick" target="_blank">
        <i class="fab fa-kickstarter"></i> Kick
      </a>
      <a href="https://www.twitch.tv/marcoslanes" class="item-card twitch" target="_blank">
        <i class="fab fa-twitch"></i> Twitch
      </a>
      <a href="https://www.instagram.com/marcoslanes" class="item-card instagram" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
      </a>
    </div>

    <div class="divider">Destaque</div>
    
    <div class="link-group">
      <a href="https://www.gvgmall.com/gvg/laneswin11" class="item-card offer-card" target="_blank">
        <i class="fab fa-windows"></i>
        <span class="offer-title">Windows 11 Pro Vitalício</span>
      </a>
    </div>

    <div class="divider">Recomendações</div>

    <div class="link-group">
      <a href="https://www.mercadolivre.com.br/social/marcoslanes/lists" class="item-card mercadolivre" target="_blank">
        <i class="fas fa-handshake"></i> Lojinha Mercado Livre
      </a>
    </div>

    <div class="divider">Contato</div>

    <div class="link-group">
      <a href="contato.html" class="item-card">
        <i class="fas fa-envelope"></i> Enviar Mensagem
      </a>
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('light-mode');
      const icon = document.getElementById('theme-icon');
      if (document.body.classList.contains('light-mode')) {
        icon.classList.remove('fa-moon');
        icon.classList.add('fa-sun');
      } else {
        icon.classList.remove('fa-sun');
        icon.classList.add('fa-moon');
      }
    }
  </script>
</body>
</html>
