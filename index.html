<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcos Lanes | Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #4f46e5;
      --bg: #000000;
      --text: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
    }

    .light-mode {
      --bg: #f4f4f4;
      --text: #1e1e1e;
      --card-bg: #ffffff;
      --card-border: #ddd;
    }

    body {
      margin: 0;
      padding: 2rem 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      transition: background-color 0.3s, color 0.3s;
    }

    /* Botão de Tema */
    .toggle-theme {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
    }

    .container {
      width: 90%;
      max-width: 450px;
      text-align: center;
    }

    .profile-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    h1 {
      font-family: 'Bebas Neue', cursive;  
      font-size: 2.8rem;
      margin: 0;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
    }

    .subtitle {
      font-size: 0.9rem;
      opacity: 0.6;
      margin: 0.5rem 0 2rem 0;
    }

    .section-title {
      font-family: 'Bebas Neue', cursive;
      font-size: 1.8rem;
      text-align: left;
      margin: 2rem 0 1rem;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--primary);
    }

    .section-title::after {
      content: "";
      height: 1px;
      background: var(--card-border);
      flex-grow: 1;
    }

    .link-list {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .item-card {
      display: flex;
      align-items: center;
      padding: 1.1rem 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      text-decoration: none;
      color: inherit;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .item-card i {
      font-size: 1.3rem;
      width: 25px;
      margin-right: 15px;
    }

    .item-card:hover {
      background: var(--primary);
      color: white;
      transform: scale(1.02);
      border-color: transparent;
    }

    /* Hover Colors */
    .youtube:hover { background: #FF0000; }
    .kick:hover { background: #00E701; color: black; }
    .twitch:hover { background: #9146FF; }
    .instagram:hover { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
    /* Estilo para o botão de contato */
    .contact:hover { background: #2563eb; }

    .offer-tag {
      margin-left: auto;
      background: rgba(128, 128, 128, 0.2);
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 0.7rem;
    }
  </style>
</head>
<body>

  <button class="toggle-theme" onclick="toggleTheme()">🌓</button>

  <div class="container">
    <img src="new_logo_lanes_01.png" alt="Marcos Lanes" class="profile-img" />
    <h1>Marcos Lanes</h1>
    <p class="subtitle"></p>

    <div class="section-title">Redes Sociais</div>
    <div class="link-list">
      <a href="https://www.youtube.com/@marcoslanes?sub_confirmation=1" class="item-card youtube" target="_blank">
        <i class="fab fa-youtube"></i> YouTube
      </a>
      <a href="https://www.kick.com/marcoslanes" class="item-card kick" target="_blank">
        <i class="fab fa-kickstarter"></i> Kick.tv
      </a>
      <a href="https://www.twitch.tv/marcoslanes" class="item-card twitch" target="_blank">
        <i class="fab fa-twitch"></i> Twitch
      </a>
      <a href="https://www.instagram.com/marcoslanes" class="item-card instagram" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
      </a>
    </div>

    <div class="section-title">Ofertas</div>
    <div class="link-list">
      <a href="https://www.gvgmall.com/gvg/laneswin11" class="item-card" target="_blank">
        <i class="fas fa-shopping-cart"></i> Licença Windows 11 Pro 
        <span class="offer-tag">Promo</span>
      </a>
    </div>

    <div class="section-title">Contato</div>
    <div class="link-list">
      <a href="contato.html" class="item-card contact">
        <i class="fas fa-envelope"></i> Enviar Mensagem
      </a>
    </div>
  </div>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('light-mode');
    }
  </script>
</body>
</html>
