<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Marcos Lanes</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #000000;
            --text: #ffffff;
            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.1);
        }

        .light-mode {
            --bg: #f4f4f4;
            --text: #1e1e1e;
            --card-bg: #ffffff;
            --card-border: #ddd;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            transition: background-color 0.3s, color 0.3s;
        }

        .toggle-theme {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .container {
            background-color: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 40px;
            border-radius: 16px;
            width: 90%;
            max-width: 450px;
        }

        h2 {
            margin-top: 0;
            font-family: 'Bebas Neue', cursive;
            text-align: center;
            font-size: 2.5rem;
            color: var(--primary);
        }

        p {
            opacity: 0.7;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--card-border);
            border-radius: 8px;
            box-sizing: border-box;
            color: var(--text);
            font-family: inherit;
            font-size: 16px;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 10px;
        }

        button:hover {
            opacity: 0.9;
        }

        .footer-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--text);
            opacity: 0.6;
            text-decoration: none;
            font-size: 14px;
        }

        .footer-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <button class="toggle-theme" onclick="toggleTheme()">🌓</button>

    <div class="container">
        <h2>Contato</h2>
        <p>Responderei o mais breve possível!</p>

        <form action="https://formspree.io/f/mbdzlkpz" method="POST">
            <input type="hidden" name="_next" value="https://marcoslanes.github.io/">

            <div class="form-group">
                <label for="nome">Seu Nome</label>
                <input type="text" id="nome" name="name" placeholder="Ex: João Silva" required>
            </div>

            <div class="form-group">
                <label for="email">Seu E-mail</label>
                <input type="email" id="email" name="_replyto" placeholder="exemplo@email.com" required>
            </div>

            <div class="form-group">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="message" placeholder="Como posso ajudar?" required></textarea>
            </div>

            <input type="hidden" name="_subject" value="Novo contato do GitHub Pages!">

            <button type="submit">Enviar Mensagem</button>
        </form>

        <a href="index.html" class="footer-link">← Voltar para a Home</a>
    </div>

    <script>
        function toggleTheme() {
            document.body.classList.toggle('light-mode');
        }
    </script>
</body>
</html>
