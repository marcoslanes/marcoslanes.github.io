<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato | Marcos Lanes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #4f46e5;
      --bg: #000000;
      --text: #ffffff;
      --card-bg: rgba(255, 255, 255, 0.05);
      --card-border: rgba(255, 255, 255, 0.1);
      --input-bg: rgba(255, 255, 255, 0.08);
    }

    .light-mode {
      --bg: #f4f4f4;
      --text: #1e1e1e;
      --card-bg: #ffffff;
      --card-border: #ddd;
      --input-bg: #ffffff;
    }

    body {
      margin: 0;
      padding: 2rem 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      transition: background-color 0.3s, color 0.3s;
    }

    .toggle-theme {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 10;
    }

    .container {
      width: 90%;
      max-width: 450px;
      text-align: center;
    }

    h1 {
      font-family: 'Bebas Neue', cursive;  
      font-size: 2.8rem;
      margin: 0 0 0.5rem 0;
      font-weight: 800;
      letter-spacing: -1.5px;
      color: var(--text);
    }

    .subtitle {
      font-size: 0.9rem;
      opacity: 0.6;
      margin-bottom: 2rem;
    }

    /* Estilização do Formulário Padrão Index */
    form {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 2rem;
      border-radius: 16px;
      text-align: left;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      opacity: 0.9;
    }

    input, textarea {
      width: 100%;
      padding: 0.8rem;
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      box-sizing: border-box;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    button {
      width: 100%;
      padding: 1rem;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: transform 0.2s, background-color 0.2s;
    }

    button:hover {
      background-color: #4338ca;
      transform: scale(1.02);
    }

    .back-link {
      display: inline-block;
      margin-top: 1.5rem;
      color: var(--text);
      text-decoration: none;
      font-size: 0.9rem;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .back-link:hover {
      opacity: 1;
    }

  </style>
</head>
<body>

  <button class="toggle-theme" onclick="toggleTheme()">🌓</button>

  <div class="container">
    <h1>Contato</h1>
    <p class="subtitle">Mande uma mensagem direta para o meu e-mail.</p>

    <form action="https://formspree.io/f/mbdzlkpz" method="POST">
      
      <input type="hidden" name="_next" value="https://marcoslanes.com/">

      <div class="form-group">
        <label for="nome">Seu Nome</label>
        <input type="text" id="nome" name="name" placeholder="Como te chamo?" required>
      </div>

      <div class="form-group">
        <label for="email">Seu E-mail</label>
        <input type="email" id="email" name="_replyto" placeholder="seu@email.com" required>
      </div>

      <div class="form-group">
        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="message" placeholder="Escreva aqui..." required></textarea>
      </div>

      <input type="hidden" name="_subject" value="Nova mensagem do seu site!">

      <button type="submit">Enviar Mensagem</button>
    </form>

    <a href="index.html" class="back-link">← Voltar para os links</a>
  </div>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('light-mode');
    }
  </script>
</body>
</html>
