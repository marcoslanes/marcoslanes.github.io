<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Entre em Contato</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            margin-top: 0;
            color: #333;
            text-align: center;
            font-size: 24px;
        }

        p {
            color: #666;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Garante que o padding não quebre a largura */
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #007bff;
        }

        textarea {
            resize: vertical;
            min-height: 120px;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        .footer-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #007bff;
            text-decoration: none;
            font-size: 14px;
        }

        .footer-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Mande uma mensagem</h2>
    <p>Responderei o mais breve possível!</p>

    <form action="https://formspree.io/f/mbdzlkpz" method="POST">
    
    <input type="hidden" name="_next" value="https://marcoslanes.com/">

    <div class="form-group">
        <label for="nome">Seu Nome</label>
        <input type="text" id="nome" name="name" placeholder="Ex: João Silva" required>
    </div>

    <div class="form-group">
        <label for="email">Seu E-mail</label>
        <input type="email" id="email" name="_replyto" placeholder="exemplo@email.com" required>
    </div>

    <div class="form-group">
        <label for="mensagem">Mensagem</label>
        <textarea id="mensagem" name="message" placeholder="Como posso ajudar?" required></textarea>
    </div>

    <input type="hidden" name="_subject" value="Novo contato do GitHub Pages!">

    <button type="submit">Enviar Mensagem</button>
</form>

    <a href="index.html" class="footer-link">← Voltar para a Home</a>
</div>

</body>
</html>
