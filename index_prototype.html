<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marcos Lanes | Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    :root {
      --primary: #6366f1;
      --primary-glow: rgba(99, 102, 241, 0.4);
      --bg-gradient: radial-gradient(circle at top, #1e1b4b, #000000);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --success: #10b981;
    }

    .light-mode {
      --bg-gradient: radial-gradient(circle at top, #e0e7ff, #f8fafc);
      --text: #0f172a;
      --text-muted: #475569;
      --card-bg: rgba(255, 255, 255, 0.6);
      --card-border: rgba(0, 0, 0, 0.05);
    }

    body {
      margin: 0;
      padding: 3rem 1rem;
      font-family: 'Inter', sans-serif;
      background: var(--bg-gradient);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
      transition: background 0.5s ease, color 0.5s ease;
    }

    .toggle-theme {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      color: var(--text);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      transition: transform 0.3s ease;
    }

    .toggle-theme:hover {
      transform: rotate(15deg) scale(1.1);
    }

    .container {
      width: 100%;
      max-width: 420px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    header {
      margin-bottom: 1rem;
    }

    .profile-img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1rem;
      border: 2px solid var(--card-border);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;  
      font-size: 3rem;
      margin: 0;
      letter-spacing: 1px;
      line-height: 1;
    }

    .bio {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin: 0.5rem 0 0;
      font-weight: 500;
    }

    .link-group {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .item-card {
      display: flex;
      align-items: center;
      padding: 1rem;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
